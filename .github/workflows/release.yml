name: Release

# Fires on semver tags (v0.1.0, v1.2.3, v1.0.0-rc.1, ...).
# Pre-release tags publish to npm under the "next" dist-tag automatically (see the npm-publish job).
on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
      - "v[0-9]+.[0-9]+.[0-9]+-*"

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run format:check
      - run: npm run check:docs
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
      - run: npm run e2e
      - name: Assert tag matches package.json version
        env:
          GITHUB_REF_NAME: ${{ github.ref_name }}
        run: |
          pkg_version=$(node -p "require('./package.json').version")
          tag_version="${GITHUB_REF_NAME#v}"
          if [ "$pkg_version" != "$tag_version" ]; then
            echo "::error::Tag $GITHUB_REF_NAME does not match package.json version $pkg_version"
            exit 1
          fi

  npm-publish:
    needs: verify
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # OIDC token for npm trusted publishing (no NPM_TOKEN needed)
    steps:
      - uses: actions/checkout@v4
      # Node 22.14+ and npm 11.5.1+ are required for OIDC trusted publishing.
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org
      - run: npm install -g npm@latest
      - run: npm ci
      - run: npm run build
      - name: Publish to npm (trusted publishing / OIDC)
        env:
          # No NODE_AUTH_TOKEN: auth is exchanged via OIDC against the trusted publisher
          # configured on npmjs.com. Provenance is attached automatically for OIDC publishes.
          GITHUB_REF_NAME: ${{ github.ref_name }}
        run: |
          # Pre-release tags (v1.2.3-rc.1) go to the "next" dist-tag so `npm i mcp-api-translator`
          # keeps pointing at the last stable release.
          if [[ "$GITHUB_REF_NAME" == *-* ]]; then
            npm publish --access public --tag next
          else
            npm publish --access public
          fi

  docker-publish:
    needs: verify
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write # push to ghcr.io
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/mcp-api-translator
          # For pre-release tags, don't move "latest".
          flavor: |
            latest=${{ !contains(github.ref_name, '-') }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}},enable=${{ !contains(github.ref_name, '-') }}
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: true
          sbom: true

  github-release:
    needs: [npm-publish, docker-publish]
    runs-on: ubuntu-latest
    permissions:
      contents: write # create release
    steps:
      - uses: actions/checkout@v4
      - name: Generate SBOM (SPDX JSON)
        uses: anchore/sbom-action@v0
        with:
          path: .
          format: spdx-json
          output-file: sbom.spdx.json
          upload-artifact: false
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: |
            sbom.spdx.json
