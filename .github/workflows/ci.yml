name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run format:check
      - run: npm run check:docs
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
      - name: Smoke-test the runtime proxy (serve mode)
        run: npm run smoke:serve

  generated-output:
    # Proves the code we emit is itself valid: generate a project, then compile it.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: npm ci
      - run: npm run build
      - run: npm run e2e
      - name: Install & typecheck the generated TypeScript project
        working-directory: build/e2e-out
        run: |
          npm install
          npx tsc
      - name: Typecheck the generated OAuth (async-auth) project
        working-directory: build/e2e-out-oauth
        run: |
          npm install
          npx tsc
      - name: Generate & compile the Python project(s)
        run: npm run e2e:python

  dco:
    # Enforce Developer Certificate of Origin sign-off on every PR commit.
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Verify Signed-off-by on every commit
        env:
          BASE: ${{ github.event.pull_request.base.sha }}
          HEAD: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          missing=0
          for sha in $(git rev-list --no-merges "$BASE".."$HEAD"); do
            if ! git log -1 --format=%B "$sha" | grep -qE '^Signed-off-by: .+ <.+@.+>$'; then
              echo "::error::Commit $sha is missing a DCO 'Signed-off-by' trailer. Run: git commit --amend -s --no-edit (or git rebase --signoff)"
              missing=1
            fi
          done
          exit $missing
