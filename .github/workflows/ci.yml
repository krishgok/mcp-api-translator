name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run format:check
      - run: npm run check:docs
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
      - name: Smoke-test the runtime proxy (serve mode)
        run: npm run smoke:serve

  generated-output:
    # Proves the code we emit is itself valid: generate a project, then compile it.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: npm ci
      - run: npm run build
      - run: npm run e2e
      - name: Install & typecheck the generated TypeScript project
        working-directory: build/e2e-out
        run: |
          npm install
          npx tsc
      - name: Typecheck the generated OAuth (async-auth) project
        working-directory: build/e2e-out-oauth
        run: |
          npm install
          npx tsc
      - name: Typecheck the generated OAuth refresh-grant project
        working-directory: build/e2e-out-oauth-refresh
        run: |
          npm install
          npx tsc
      - name: Generate & compile the Python project(s)
        run: npm run e2e:python
      - name: Smoke-test the generated FastMCP variant (in-memory client)
        run: |
          python -m pip install --quiet "fastmcp>=2,<3"
          python scripts/fastmcp-smoke.py
