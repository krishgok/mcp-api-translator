openapi: 3.0.0
info:
  title: Widgets API
  version: 1.0.0
servers:
  - url: https://widgets.example.com
paths:
  /widgets:
    get:
      operationId: listWidgets
      summary: List widgets
      security:
        - oauthCc: []
      responses:
        "200":
          description: ok
components:
  securitySchemes:
    oauthCc:
      type: oauth2
      flows:
        clientCredentials:
          tokenUrl: https://widgets.example.com/oauth/token
          scopes: {}
